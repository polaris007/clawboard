server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clawboard}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p %t --- [%15.15t] %-40.40logger{39} : %m%n"

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

# PageHelper Configuration
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

clawboard:
  nas:
    base-path: ${NAS_BASE_PATH:/mnt/nas}
    openclaw-dir: agents
  reports:
    output-dir: reports
  scan:
    cron: "0 0 */6 * * *"
    thread-pool-size: 8
    batch-size: 100
    enabled: true
  parser:
    max-error-message-length: 500
    max-user-input-length: 200
    system-message-prefixes:
      - "A new session was started"
      - "Run your Session Startup sequence"
      - "Read HEARTBEAT.md"
      - "<<<BEGIN_OPENCLAW_INTERNAL_CONTEXT>>>"
      - "System: ["
      - "<inbound_metadata>"
      - "<openclaw-envelope>"
    delivery-mirror-filter: true
  skill:
    name-mapping:
      official-doc-writer: 公文写作
      pptx: ppt生成
  aggregation:
    # 是否启用智能混合聚合策略
    enable-smart-aggregation: true
    # 时间窗口大小（小时），默认 24 小时
    time-window-hours: 24
    # 是否启用基于文件的增量聚合
    enable-file-based-incremental: true
    # 是否启用时间窗口兜底
    enable-time-window: true
