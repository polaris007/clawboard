server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:clawboard}?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:clawboard}
    password: ${DB_PASS:Clqc@1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

clawboard:
  nas:
    base-path: D:/workplace/github/clawboard/test/session-transcript
    openclaw-dir: .openclaw
  reports:
    output-dir: reports
  scan:
    cron: "0 0 */6 * * *"
    thread-pool-size: 8
    batch-size: 100
    enabled: true
  parser:
    max-error-message-length: 500
    max-user-input-length: 200
    system-message-prefixes:
      - "A new session was started"
      - "Run your Session Startup sequence"
      - "Read HEARTBEAT.md"
      - "<<<BEGIN_OPENCLAW_INTERNAL_CONTEXT>>>"
      - "System: ["
      - "<inbound_metadata>"
      - "<openclaw-envelope>"
    delivery-mirror-filter: false
  skill:
    name-mapping:
      official-doc-writer: 公文写作
      pptx: ppt生成
