server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  charset:
    console: UTF-8
    file: UTF-8
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p %t --- [%15.15t] %-40.40logger{39} : %m%n"

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/clawboard?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: clawboard
    password: Clqc@1234
    driver-class-name: com.mysql.cj.jdbc.Driver

# PageHelper Configuration
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

clawboard:
  nas:
    base-path: G:/Workplace/github/clawboard/test/session-transcript   # Test directory
    # Examples:
    # base-path: D:/CompanyData/OpenClaw    # Windows absolute path
    # base-path: /mnt/nas                   # Linux NAS mount point
    # base-path: C:/Users/YourName/.openclaw # Local OpenClaw data
    
    openclaw-dir: agents  # For hash-based structure: {basePath}/{hash}/agents/{agentName}/sessions
    # If your structure is: {basePath}/{employeeId}/.openclaw/agents/main/sessions/
    # Then set: openclaw-dir: .openclaw
    
    accounts-csv-path: G:/Workplace/github/clawboard/scripts/accounts.csv  # Employee ID mapping file
  reports:
    output-dir: reports  # Configurable reports directory
  scan:
    cron: "0 0 */6 * * *"
    thread-pool-size: 8
    batch-size: 100
    enabled: true
  parser:
    max-error-message-length: 500
    max-user-input-length: 200
    system-message-prefixes:
      - "A new session was started"
      - "Run your Session Startup sequence"
      - "Read HEARTBEAT.md"
      - "<<<BEGIN_OPENCLAW_INTERNAL_CONTEXT>>>"
      - "System: ["
      - "<inbound_metadata>"
      - "<openclaw-envelope>"
    delivery-mirror-filter: false
  skill:
    name-mapping:
      official-doc-writer: 公文写作
      pptx: ppt生成
