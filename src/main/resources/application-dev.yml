spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/clawboard?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: clawboard
    password: Clqc@1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false  # Disabled for MySQL 5.7 compatibility

clawboard:
  nas:
    base-path: ./test/session-transcript   # Test directory - Change this to your actual data path
    # Examples:
    # base-path: D:/CompanyData/OpenClaw    # Windows absolute path
    # base-path: /mnt/nas                   # Linux NAS mount point
    # base-path: C:/Users/YourName/.openclaw # Local OpenClaw data
    
    openclaw-dir: ""  # Empty for flat structure, or ".openclaw" for standard structure
    # If your structure is: {basePath}/{employeeId}/.openclaw/agents/main/sessions/
    # Then set: openclaw-dir: .openclaw
    
    accounts-csv-path: scripts/accounts.csv  # Employee ID mapping file
  reports:
    output-dir: scripts/reports  # Configurable reports directory
